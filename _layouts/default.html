<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="theme-color" content="#0891B2">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/logo-mark.svg' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/images/logo-mark.svg' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400..700;1,9..40,400..700&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <nav class="site-nav" aria-label="Primary">
      <a href="{{ '/' | relative_url }}" class="brand">
        <span class="brand-mark" aria-hidden="true">
          <img src="{{ '/assets/images/logo-mark.svg' | relative_url }}" alt="" class="brand-logo">
        </span>
        <span class="brand-name">working from home <span class="brand-accent">unltd</span></span>
      </a>
      <button class="nav-toggle" type="button" aria-controls="primary-menu" aria-expanded="false" aria-label="Open menu">
        <span class="material-symbols-rounded">menu</span>
      </button>
      <ul id="primary-menu" class="nav-links">
        <li><a href="#apps">Apps</a></li>
        <li><a href="#studio">Studio</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer" id="contact">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="brand-mark" aria-hidden="true">
          <img src="{{ '/assets/images/logo-mark.svg' | relative_url }}" alt="" class="brand-logo">
        </span>
        <div>
          <p class="footer-title">working from home <span class="brand-accent">unltd</span></p>
          <p class="footer-meta">A small indie studio · &copy; {{ site.time | date: '%Y' }}</p>
        </div>
      </div>
      <ul class="footer-links">
        <li><a href="https://dietcoach.wfhunlimited.com">Diet Coach</a></li>
        <li><a href="https://aquariumsensei.wfhunlimited.com">Aquarium Sensei</a></li>
        <li><a href="mailto:wfh-appstore-contact@googlegroups.com">Contact</a></li>
      </ul>
    </div>
  </footer>

  <script>
    (function () {
      var btn = document.querySelector('.nav-toggle');
      var menu = document.getElementById('primary-menu');
      if (!btn || !menu) return;
      btn.addEventListener('click', function () {
        var open = menu.classList.toggle('is-open');
        btn.setAttribute('aria-expanded', open ? 'true' : 'false');
      });
    })();
  </script>
</body>
</html>
